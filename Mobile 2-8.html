<title>LokahiPis 2</title>
<style>
  body {
    margin: 0;
    width: 100%;
    height: 150vh;
    background-color: #20e4b9;
    background-image: linear-gradient(43deg, #078a69 0%, #50e4bf 46%, #00fff2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
  }


  .logo-img {
    margin-top: 30px;
    max-width: 10%;
    height: auto;
  }


  .title-container {
    margin-top: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .title {
    font-size: 2rem;
    font-weight: bold;
    color: #131313;
    margin: 10px;
    text-align: center;
  }

  .button-container {
    margin-top: 50px;
    display: flex;
    justify-content: center;
    width: 100%;
  }


  .boton-elegante {
    left: 100px;
    top: -105px;
    padding: 16px 31px;
    border: 2px solid #2c2c2c;
    background-color: #1a1a1a;
    color: #ffffff;
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.4s ease;
    outline: none;
    position: relative;
    overflow: hidden;
    font-weight: bold;
  }

  .boton-elegante::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      circle,
      rgba(255, 255, 255, 0.25) 0%,
      rgba(255, 255, 255, 0) 70%
    );
    transform: scale(0);
    transition: transform 0.5s ease;
  }

  .boton-elegante:hover::after {
    transform: scale(4);
  }

  .boton-elegante:hover {
    border-color: #666666;
    background: #292929;
  }


  .image-section {
    margin-top: 50px;
    display: flex;
    justify-content: center;
    width: 100%;
  }

  .stranka img {
    top: -100px;
    max-width: 80%;
    height: 30%;
    border-radius: 10px;
  }


  @media(max-width: 768px) {
    .logo-img {
      max-width: 20%;
    }

    .title {
      font-size: 1.5rem;
    }

    .boton-elegante {
      padding: 10px 20px;
      font-size: 1rem;
    }

    .stranka img {
      max-width: 90%;
    }
  }

  .boton-elegante1 {

  .boton-elegante1:hover::after {

  .boton-elegante1:hover {

.image-box img {

}

</style>
